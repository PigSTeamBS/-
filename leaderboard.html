<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Таблица рекордов | Pigs Team</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 20% 40%, #1f1b24, #030303);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .leaderboard-container {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 30px;
            border: 1px solid rgba(255,107,107,0.5);
            max-width: 700px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ffb347, #ff6b6b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            color: #f0f0f0;
        }
        th, td {
            padding: 12px;
            border-bottom: 1px solid rgba(255,107,107,0.3);
            text-align: center;
        }
        th {
            color: #ffb347;
            font-weight: 600;
        }
        .rank-1 td:first-child {
            color: gold;
            font-weight: bold;
        }
        .rank-2 td:first-child {
            color: silver;
        }
        .rank-3 td:first-child {
            color: #cd7f32;
        }
        .empty-message {
            color: #aaa;
            padding: 20px;
        }
        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        button {
            background: rgba(255,107,107,0.2);
            border: 1px solid #ff6b6b;
            color: #ffb347;
            font-weight: bold;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(4px);
        }
        button:hover {
            background: rgba(255,107,107,0.4);
            transform: scale(1.02);
        }
        .back-link {
            margin-top: 20px;
        }
        .back-link a {
            color: #ffb347;
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px dashed;
        }
        @media (max-width: 600px) {
            .leaderboard-container { padding: 20px; }
            h1 { font-size: 1.8rem; }
            th, td { padding: 8px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
<div class="leaderboard-container">
    <h1><i class="fas fa-trophy"></i> Таблица рекордов</h1>
    <div id="leaderboardTable">
        <!-- таблица заполняется скриптом -->
    </div>
    <div class="buttons">
        <button id="resetLeaderboard">Сбросить таблицу</button>
        <button id="backToGame">← Вернуться в игру</button>
    </div>
    <div class="back-link">
        <a href="index.html">На главный сайт</a>
    </div>
</div>

<script>
    // Функция для безопасного получения данных из localStorage
    function getLeaderboard() {
        try {
            let raw = localStorage.getItem('pigLeaderboard');
            if (!raw) return [];
            let data = JSON.parse(raw);
            // Проверяем, что data — массив
            if (!Array.isArray(data)) return [];
            // Фильтруем и приводим каждую запись к нужному формату
            data = data.filter(entry => entry && typeof entry === 'object' && typeof entry.name === 'string' && typeof entry.score === 'number');
            // Сортируем по убыванию очков
            data.sort((a, b) => b.score - a.score);
            // Оставляем топ-10
            return data.slice(0, 10);
        } catch (e) {
            console.error("Ошибка чтения таблицы рекордов:", e);
            return [];
        }
    }

    function saveLeaderboard(data) {
        try {
            localStorage.setItem('pigLeaderboard', JSON.stringify(data));
        } catch (e) {
            console.error("Ошибка сохранения таблицы рекордов:", e);
        }
    }

    function loadLeaderboard() {
        const leaderboard = getLeaderboard();
        const container = document.getElementById('leaderboardTable');
        if (!container) return;
        if (leaderboard.length === 0) {
            container.innerHTML = '<div class="empty-message">Пока нет рекордов. Стань первым!</div>';
            return;
        }
        let html = '<table><th>Место</th><th>Игрок</th><th>Очки</th><th>Дата</th></tr>';
        leaderboard.forEach((entry, index) => {
            let rankClass = '';
            if (index === 0) rankClass = 'rank-1';
            if (index === 1) rankClass = 'rank-2';
            if (index === 2) rankClass = 'rank-3';
            let date = entry.date || '';
            // Безопасное экранирование имени
            let safeName = entry.name.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
            html += `<tr class="${rankClass}">
                        <td>${index + 1}</td>
                        <td>${safeName}</td>
                        <td>${entry.score}</td>
                        <td>${date}</td>
                     </tr>`;
        });
        html += '</table>';
        container.innerHTML = html;
    }

    function resetLeaderboard() {
        if (confirm('Сбросить таблицу рекордов? Это действие нельзя отменить.')) {
            localStorage.removeItem('pigLeaderboard');
            loadLeaderboard();
        }
    }

    document.getElementById('resetLeaderboard').addEventListener('click', resetLeaderboard);
    document.getElementById('backToGame').addEventListener('click', () => {
        window.location.href = 'game.html';
    });

    loadLeaderboard();
</script>
</body>
</html>
