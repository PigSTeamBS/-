<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Таблица рекордов | Pigs Team</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 20% 40%, #1f1b24, #030303);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            display: block;
        }
        .leaderboard-container {
            position: relative;
            z-index: 2;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 30px;
            border: 1px solid rgba(255,107,107,0.5);
            max-width: 800px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ffb347, #ff6b6b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            color: #f0f0f0;
        }
        th, td {
            padding: 12px;
            border-bottom: 1px solid rgba(255,107,107,0.3);
            text-align: center;
        }
        th {
            color: #ffb347;
            font-weight: 600;
        }
        .rank-1 td:first-child {
            color: gold;
            font-weight: bold;
        }
        .rank-2 td:first-child {
            color: silver;
        }
        .rank-3 td:first-child {
            color: #cd7f32;
        }
        .empty-message {
            color: #aaa;
            padding: 20px;
        }
        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        button {
            background: rgba(255,107,107,0.2);
            border: 1px solid #ff6b6b;
            color: #ffb347;
            font-weight: bold;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(4px);
        }
        button:hover {
            background: rgba(255,107,107,0.4);
            transform: scale(1.02);
        }
        .back-link {
            margin-top: 20px;
        }
        .back-link a {
            color: #ffb347;
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px dashed;
        }
        .loading {
            color: #ffb347;
            padding: 20px;
        }
        @media (max-width: 600px) {
            .leaderboard-container { padding: 20px; }
            h1 { font-size: 1.8rem; }
            th, td { padding: 8px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="leaderboard-container">
    <h1><i class="fas fa-trophy"></i> Таблица рекордов</h1>
    <div id="leaderboardTable"><div class="loading">Загрузка рекордов...</div></div>
    <div class="buttons">
        <button id="refreshBtn">🔄 Обновить</button>
        <button id="backToGame">← Вернуться в игру</button>
    </div>
    <div class="back-link"><a href="index.html">На главный сайт</a></div>
</div>

<script>
    // ==================== ФОН (частицы + свиньи) ====================
    const bgCanvas = document.getElementById('bg-canvas');
    const bgCtx = bgCanvas.getContext('2d');
    let bgWidth, bgHeight;
    let particles = [];
    let flyingPigs = [];
    let mouseX = 0, mouseY = 0;

    function resizeBgCanvas() {
        bgWidth = window.innerWidth;
        bgHeight = window.innerHeight;
        bgCanvas.width = bgWidth;
        bgCanvas.height = bgHeight;
    }
    window.addEventListener('resize', resizeBgCanvas);
    resizeBgCanvas();

    const PARTICLE_COUNT = 40;
    class Particle {
        constructor() {
            this.x = Math.random() * bgWidth;
            this.y = Math.random() * bgHeight;
            this.size = Math.random() * 2 + 1;
            this.speedX = (Math.random() - 0.5) * 0.3;
            this.speedY = (Math.random() - 0.5) * 0.3;
            this.opacity = Math.random() * 0.5 + 0.2;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            if (this.x < 0) this.x = bgWidth;
            if (this.x > bgWidth) this.x = 0;
            if (this.y < 0) this.y = bgHeight;
            if (this.y > bgHeight) this.y = 0;
            const dx = mouseX - this.x;
            const dy = mouseY - this.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 100) {
                const angle = Math.atan2(dy, dx);
                const force = (100 - dist) / 100 * 1.2;
                this.x -= Math.cos(angle) * force;
                this.y -= Math.sin(angle) * force;
            }
        }
        draw() {
            bgCtx.beginPath();
            bgCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            bgCtx.fillStyle = `rgba(255, 107, 107, ${this.opacity})`;
            bgCtx.fill();
        }
    }

    const PIG_COUNT = 4;
    class FlyingPig {
        constructor() {
            this.x = Math.random() * bgWidth;
            this.y = Math.random() * bgHeight;
            this.size = Math.random() * 28 + 20;
            this.speedX = (Math.random() - 0.5) * 0.2;
            this.speedY = (Math.random() - 0.5) * 0.2;
            this.opacity = Math.random() * 0.4 + 0.2;
            this.rotation = Math.random() * Math.PI * 2;
            this.rotationSpeed = (Math.random() - 0.5) * 0.008;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.rotation += this.rotationSpeed;
            const dx = mouseX - this.x;
            const dy = mouseY - this.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 100) {
                const angle = Math.atan2(dy, dx);
                const force = (100 - dist) / 100 * 1.0;
                this.x -= Math.cos(angle) * force;
                this.y -= Math.sin(angle) * force;
            }
            if (this.x < -60) this.x = bgWidth + 60;
            if (this.x > bgWidth + 60) this.x = -60;
            if (this.y < -60) this.y = bgHeight + 60;
            if (this.y > bgHeight + 60) this.y = -60;
        }
        draw() {
            bgCtx.save();
            bgCtx.translate(this.x, this.y);
            bgCtx.rotate(this.rotation);
            bgCtx.font = `${this.size}px "Segoe UI Emoji", "Apple Color Emoji", sans-serif`;
            bgCtx.shadowBlur = 6;
            bgCtx.shadowColor = "rgba(255,107,107,0.5)";
            bgCtx.globalAlpha = this.opacity;
            bgCtx.fillStyle = "#ffb347";
            bgCtx.fillText("🐷", 0, 0);
            bgCtx.globalAlpha = 1;
            bgCtx.shadowBlur = 0;
            bgCtx.restore();
        }
    }

    function initBackground() {
        particles = [];
        for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());
        flyingPigs = [];
        for (let i = 0; i < PIG_COUNT; i++) flyingPigs.push(new FlyingPig());
    }
    initBackground();

    function animateBackground() {
        if (!bgCtx) return;
        bgCtx.clearRect(0, 0, bgWidth, bgHeight);
        particles.forEach(p => { p.update(); p.draw(); });
        flyingPigs.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animateBackground);
    }
    animateBackground();

    document.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
    document.addEventListener('touchmove', (e) => { const touch = e.touches[0]; mouseX = touch.clientX; mouseY = touch.clientY; });
    document.addEventListener('touchend', () => { mouseX = -1000; mouseY = -1000; });

    // ==================== MockAPI ====================
    const API_URL = "https://69cd2d94ddc3cabb7bd24353.mockapi.io/leaderboard";

    async function fetchLeaderboard() {
        try {
            const response = await fetch(API_URL);
            let data = await response.json();
            if (!Array.isArray(data)) return [];
            data.sort((a,b) => b.score - a.score);
            return data.slice(0,10);
        } catch (e) {
            console.error(e);
            return [];
        }
    }

    async function loadLeaderboard() {
        const container = document.getElementById('leaderboardTable');
        container.innerHTML = '<div class="loading">Загрузка рекордов...</div>';
        const leaderboard = await fetchLeaderboard();
        if (!leaderboard || leaderboard.length === 0) {
            container.innerHTML = '<div class="empty-message">Пока нет рекордов. Стань первым!</div>';
            return;
        }
        let html = '点<table>\n<thead>\n<th>Место</th><th>Игрок</th><th>Очки</th><th>Дата</th>\n</thead>\n<tbody>';
        leaderboard.forEach((entry, index) => {
            let rankClass = '';
            if (index === 0) rankClass = 'rank-1';
            if (index === 1) rankClass = 'rank-2';
            if (index === 2) rankClass = 'rank-3';
            let safeName = entry.name.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
            html += `<tr class="${rankClass}">
                          <td>${index + 1}</td>
                          <td>${safeName}</td>
                          <td>${entry.score}</td>
                          <td>${entry.date || ''}</td>
                       </tr>`;
        });
        html += '</tbody></table>';
        container.innerHTML = html;
    }

    // Функция для добавления рекорда из game.html (будет доступна глобально)
    window.addOnlineRecord = async function(name, score) {
        try {
            // Проверим, есть ли уже запись для этого имени
            const checkResponse = await fetch(API_URL + `?name=${encodeURIComponent(name)}`);
            let existing = await checkResponse.json();
            if (existing.length > 0) {
                const record = existing[0];
                if (score > record.score) {
                    await fetch(API_URL + '/' + record.id, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            name: name,
                            score: score,
                            date: new Date().toLocaleDateString()
                        })
                    });
                    return true;
                } else {
                    return false; // новый счёт не выше
                }
            } else {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: name,
                        score: score,
                        date: new Date().toLocaleDateString()
                    })
                });
                return true;
            }
        } catch(e) {
            console.error(e);
            return false;
        }
    };

    document.getElementById('refreshBtn').addEventListener('click', loadLeaderboard);
    document.getElementById('backToGame').addEventListener('click', () => {
        window.location.href = 'game.html';
    });

    loadLeaderboard();
</script>
</body>
</html>
