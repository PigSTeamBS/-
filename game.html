<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Игра «Собери корм» | Pigs Team</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        /* (весь CSS остаётся без изменений, он уже есть в твоём файле) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 20% 40%, #1f1b24, #030303);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            display: block;
        }
        .game-container {
            position: relative;
            z-index: 2;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 20px;
            border: 1px solid rgba(255,107,107,0.5);
            max-width: 1000px;
            width: 100%;
        }
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 20px;
            padding: 0 16px;
        }
        .score-box, .best-box, .miss-box, .speed-box {
            background: rgba(0,0,0,0.6);
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #ffb347;
            border: 1px solid #ff6b6b;
        }
        .score-box span, .best-box span, .miss-box span, .speed-box span {
            color: white;
            font-size: 0.9rem;
        }
        .miss-box {
            color: #ff8888;
        }
        .speed-box {
            color: #88ff88;
        }
        .canvas-wrapper {
            display: flex;
            justify-content: center;
            position: relative;
        }
        canvas {
            background: rgba(20,20,30,0.5);
            border-radius: 32px;
            cursor: crosshair;
            box-shadow: 0 0 20px rgba(255,107,107,0.3);
            width: 100%;
            height: auto;
            border: 1px solid #ff6b6b;
            display: block;
        }
        .game-over-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            padding: 16px 32px;
            border-radius: 60px;
            font-size: 2rem;
            font-weight: bold;
            color: #ff6b6b;
            border: 2px solid #ff6b6b;
            white-space: nowrap;
            z-index: 10;
            pointer-events: none;
            text-align: center;
            box-shadow: 0 0 20px rgba(255,107,107,0.5);
        }
        .save-score-panel {
            margin-top: 20px;
            text-align: center;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 16px;
            display: none;
            border: 1px solid rgba(255,107,107,0.5);
        }
        .save-score-panel input {
            padding: 10px 16px;
            border-radius: 40px;
            border: 1px solid rgba(255,107,107,0.5);
            background: rgba(255,255,255,0.15);
            color: white;
            font-size: 1rem;
            outline: none;
            margin: 5px;
            width: 180px;
            backdrop-filter: blur(4px);
        }
        .save-score-panel input::placeholder {
            color: #ccc;
        }
        .save-score-panel button {
            background: #ff6b6b;
            color: #0a0a0c;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            transition: 0.2s;
        }
        .save-score-panel button:hover {
            transform: scale(1.02);
            background: #ff5252;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 24px;
            flex-wrap: wrap;
        }
        button {
            background: rgba(255,107,107,0.2);
            border: 1px solid #ff6b6b;
            color: #ffb347;
            font-weight: bold;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(4px);
        }
        button:hover {
            background: rgba(255,107,107,0.4);
            transform: scale(1.02);
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: #ffb347;
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px dashed;
        }
        @media (max-width: 600px) {
            .score-box, .best-box, .miss-box, .speed-box { font-size: 1rem; padding: 4px 12px; }
            button { padding: 6px 18px; }
            .game-over-message { font-size: 1.4rem; padding: 12px 24px; white-space: nowrap; }
            .save-score-panel input { width: 140px; }
        }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="game-container">
    <div class="game-header">
        <div class="score-box">🐷 <span id="score">0</span></div>
        <div class="best-box">🏆 <span id="best">0</span></div>
        <div class="miss-box">❌ <span id="miss">0</span> / 4</div>
        <div class="speed-box">⚡ <span id="speedMultiplier">1.0</span>x</div>
    </div>
    <div class="canvas-wrapper">
        <canvas id="gameCanvas" width="900" height="600" style="width:100%; height:auto; max-width:900px; aspect-ratio:900/600"></canvas>
        <div id="gameOverMsg" class="game-over-message" style="display: none;">GAME OVER</div>
    </div>
    <div id="saveScorePanel" class="save-score-panel">
        <input type="text" id="playerName" placeholder="Ник (макс 15)" maxlength="15">
        <input type="password" id="playerPassword" placeholder="Пароль (мин 3)" maxlength="20">
        <button id="saveScoreBtn">Сохранить рекорд</button>
        <div id="saveMessage" style="color:#ffb347; margin-top:8px; font-size:0.9rem;"></div>
    </div>
    <div class="controls">
        <button id="resetGame">Новая игра</button>
        <button id="leaderboardBtn">🏆 Таблица рекордов</button>
        <button id="backToSite" onclick="window.location.href='index.html'">На главную</button>
    </div>
    <div class="back-link">
        <a href="index.html">← Вернуться на сайт Pigs Team</a>
    </div>
</div>

<script>
    // ==================== ФОН (частицы + свиньи) ====================
    const bgCanvas = document.getElementById('bg-canvas');
    const bgCtx = bgCanvas.getContext('2d');
    let bgWidth, bgHeight;
    let particles = [];
    let flyingPigs = [];
    let mouseX = 0, mouseY = 0;

    function resizeBgCanvas() {
        bgWidth = window.innerWidth;
        bgHeight = window.innerHeight;
        bgCanvas.width = bgWidth;
        bgCanvas.height = bgHeight;
    }
    window.addEventListener('resize', resizeBgCanvas);
    resizeBgCanvas();

    const PARTICLE_COUNT = 40;
    class Particle {
        constructor() {
            this.x = Math.random() * bgWidth;
            this.y = Math.random() * bgHeight;
            this.size = Math.random() * 2 + 1;
            this.speedX = (Math.random() - 0.5) * 0.3;
            this.speedY = (Math.random() - 0.5) * 0.3;
            this.opacity = Math.random() * 0.5 + 0.2;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            if (this.x < 0) this.x = bgWidth;
            if (this.x > bgWidth) this.x = 0;
            if (this.y < 0) this.y = bgHeight;
            if (this.y > bgHeight) this.y = 0;
            const dx = mouseX - this.x;
            const dy = mouseY - this.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 100) {
                const angle = Math.atan2(dy, dx);
                const force = (100 - dist) / 100 * 1.2;
                this.x -= Math.cos(angle) * force;
                this.y -= Math.sin(angle) * force;
            }
        }
        draw() {
            bgCtx.beginPath();
            bgCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            bgCtx.fillStyle = `rgba(255, 107, 107, ${this.opacity})`;
            bgCtx.fill();
        }
    }

    const PIG_COUNT = 4;
    class FlyingPig {
        constructor() {
            this.x = Math.random() * bgWidth;
            this.y = Math.random() * bgHeight;
            this.size = Math.random() * 28 + 20;
            this.speedX = (Math.random() - 0.5) * 0.2;
            this.speedY = (Math.random() - 0.5) * 0.2;
            this.opacity = Math.random() * 0.4 + 0.2;
            this.rotation = Math.random() * Math.PI * 2;
            this.rotationSpeed = (Math.random() - 0.5) * 0.008;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.rotation += this.rotationSpeed;
            const dx = mouseX - this.x;
            const dy = mouseY - this.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 100) {
                const angle = Math.atan2(dy, dx);
                const force = (100 - dist) / 100 * 1.0;
                this.x -= Math.cos(angle) * force;
                this.y -= Math.sin(angle) * force;
            }
            if (this.x < -60) this.x = bgWidth + 60;
            if (this.x > bgWidth + 60) this.x = -60;
            if (this.y < -60) this.y = bgHeight + 60;
            if (this.y > bgHeight + 60) this.y = -60;
        }
        draw() {
            bgCtx.save();
            bgCtx.translate(this.x, this.y);
            bgCtx.rotate(this.rotation);
            bgCtx.font = `${this.size}px "Segoe UI Emoji", "Apple Color Emoji", sans-serif`;
            bgCtx.shadowBlur = 6;
            bgCtx.shadowColor = "rgba(255,107,107,0.5)";
            bgCtx.globalAlpha = this.opacity;
            bgCtx.fillStyle = "#ffb347";
            bgCtx.fillText("🐷", 0, 0);
            bgCtx.globalAlpha = 1;
            bgCtx.shadowBlur = 0;
            bgCtx.restore();
        }
    }

    function initBackground() {
        particles = [];
        for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());
        flyingPigs = [];
        for (let i = 0; i < PIG_COUNT; i++) flyingPigs.push(new FlyingPig());
    }
    initBackground();

    function animateBackground() {
        if (!bgCtx) return;
        bgCtx.clearRect(0, 0, bgWidth, bgHeight);
        particles.forEach(p => { p.update(); p.draw(); });
        flyingPigs.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animateBackground);
    }
    animateBackground();

    document.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
    document.addEventListener('touchmove', (e) => { const touch = e.touches[0]; mouseX = touch.clientX; mouseY = touch.clientY; });
    document.addEventListener('touchend', () => { mouseX = -1000; mouseY = -1000; });

    // ==================== MockAPI (онлайн-рекорды) ====================
    const API_URL = "https://69cd2d94ddc3cabb7bd24353.mockapi.io/leaderboard";

    async function addOnlineRecord(name, score) {
        try {
            // Проверяем, есть ли уже запись с таким ником
            const checkResponse = await fetch(API_URL + `?name=${encodeURIComponent(name)}`);
            let existing = await checkResponse.json();
            if (existing.length > 0) {
                const record = existing[0];
                if (score > record.score) {
                    // Обновляем существующую запись
                    await fetch(API_URL + '/' + record.id, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            name: name,
                            score: score,
                            date: new Date().toLocaleDateString()
                        })
                    });
                    return true; // обновлено
                } else {
                    return false; // новый счёт не выше
                }
            } else {
                // Создаём новую запись
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: name,
                        score: score,
                        date: new Date().toLocaleDateString()
                    })
                });
                return true; // создано
            }
        } catch(e) {
            console.error("Ошибка при сохранении онлайн-рекорда:", e);
            return false;
        }
    }

    // ==================== ОСНОВНАЯ ИГРА ====================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let score = 0;
    let bestScore = localStorage.getItem('pigGameBest') ? parseInt(localStorage.getItem('pigGameBest')) : 0;
    let items = [];
    let gameRunning = true;
    let spawnInterval;
    let animationId;
    let missed = 0;
    const MAX_MISS = 4;                     // всего 4 ошибки
    let finalScore = 0;
    
    // Динамическая сложность – множители по порогам
    let currentSpeedMultiplier = 1.0;
    const MAX_SPEED_MULT = 2.0;
    // Пороги и множители
    const speedThresholds = [
        { score: 15, mult: 1.1 },
        { score: 25, mult: 1.2 },
        { score: 40, mult: 1.3 },
        { score: 75, mult: 1.4 },
        { score: 90, mult: 1.5 },
        { score: 115, mult: 1.6 }
        // дальнейшие: при 140 -> 1.7, 170 -> 1.8, 200 -> 1.9, 230 -> 2.0
    ];

    function getSpeedMultiplier(currentScore) {
        let mult = 1.0;
        for (let i = 0; i < speedThresholds.length; i++) {
            if (currentScore >= speedThresholds[i].score) {
                mult = speedThresholds[i].mult;
            } else {
                break;
            }
        }
        // после последнего порога добавляем плавный рост до 2.0
        if (currentScore >= 140) mult = Math.min(2.0, 1.6 + Math.floor((currentScore - 115) / 30) * 0.1);
        return Math.min(mult, MAX_SPEED_MULT);
    }

    function updateSpeedMultiplier() {
        let newMult = getSpeedMultiplier(score);
        if (newMult !== currentSpeedMultiplier) {
            currentSpeedMultiplier = newMult;
            document.getElementById('speedMultiplier').innerText = currentSpeedMultiplier.toFixed(2);
        }
    }

    // Звуки
    const sounds = [
        new Audio('https://zvukogram.com/zvuk/73601/'),
        new Audio('https://zvukogram.com/zvuk/37934/'),
        new Audio('https://zvukogram.com/zvuk/73608/')
    ];
    sounds.forEach(s => s.load());

    const ITEM_TYPES = [
        { emoji: '🌽', points: 1, rare: false },
        { emoji: '🍎', points: 1, rare: false },
        { emoji: '🥕', points: 1, rare: false },
        { emoji: '🌽✨', points: 3, rare: true }
    ];

    class FoodItem {
        constructor(x, y, type, speedMultiplier) {
            this.x = x;
            this.y = y;
            this.type = type;
            this.radius = 34;
            let baseSpeed = 100 + Math.random() * 50;
            this.speedY = (baseSpeed * (type.rare ? 1.3 : 1.0)) * speedMultiplier;
            let sideSpeed = (Math.random() - 0.5) * 70;
            if (type.rare) sideSpeed *= 1.3;
            this.speedX = sideSpeed;
        }
        update(deltaTime) {
            this.x += this.speedX * deltaTime;
            this.y += this.speedY * deltaTime;
            if (this.y > canvas.height + 50) return false;
            if (this.x < this.radius) this.x = this.radius;
            if (this.x > canvas.width - this.radius) this.x = canvas.width - this.radius;
            return true;
        }
        draw() {
            ctx.save();
            ctx.shadowBlur = 8;
            ctx.shadowColor = "rgba(0,0,0,0.3)";
            ctx.font = `${this.radius * 1.2}px "Segoe UI Emoji", "Apple Color Emoji"`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(this.type.emoji, this.x, this.y);
            ctx.restore();
        }
    }

    let pigX = canvas.width / 2;
    let targetPigX = canvas.width / 2;
    const pigY = canvas.height - 60;
    const pigRadius = 42;
    const PIG_SPEED = 700;

    function setTargetPosition(clientX) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        let canvasX = (clientX - rect.left) * scaleX;
        canvasX = Math.min(Math.max(canvasX, pigRadius), canvas.width - pigRadius);
        targetPigX = canvasX;
    }

    function handleMove(e) {
        let clientX;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            e.preventDefault();
        } else {
            clientX = e.clientX;
        }
        setTargetPosition(clientX);
    }

    function updatePigPosition(deltaTime) {
        let diff = targetPigX - pigX;
        let move = Math.min(Math.abs(diff), PIG_SPEED * deltaTime);
        pigX += Math.sign(diff) * move;
    }

    function checkCollisions() {
        for (let i = items.length-1; i >= 0; i--) {
            const item = items[i];
            const dx = pigX - item.x;
            const dy = pigY - item.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < pigRadius + item.radius) {
                items.splice(i,1);
                addScore(item.type.points);
                playOink();
            }
        }
    }

    function spawnItem() {
        if (!gameRunning) return;
        let type;
        if (Math.random() < 0.12 && score > 10) {
            type = ITEM_TYPES[3];
        } else {
            type = ITEM_TYPES[Math.floor(Math.random() * 3)];
        }
        let x = 40 + Math.random() * (canvas.width - 80);
        const y = -20;
        items.push(new FoodItem(x, y, type, currentSpeedMultiplier));
    }

    function addScore(points) {
        score += points;
        document.getElementById('score').innerText = score;
        if (score > bestScore) {
            bestScore = score;
            localStorage.setItem('pigGameBest', bestScore);
            document.getElementById('best').innerText = bestScore;
        }
        updateSpeedMultiplier();
    }

    function addMiss() {
        missed++;
        document.getElementById('miss').innerText = missed;
        if (missed >= MAX_MISS) {
            gameOver();
        }
    }

    function playOink() {
        const randomSound = sounds[Math.floor(Math.random() * sounds.length)];
        randomSound.currentTime = 0;
        randomSound.play().catch(e => console.log("Audio play failed", e));
    }

    function gameOver() {
        if (!gameRunning) return;
        gameRunning = false;
        if (spawnInterval) clearInterval(spawnInterval);
        document.getElementById('gameOverMsg').style.display = 'block';
        finalScore = score;
        if (finalScore > 0) {
            document.getElementById('saveScorePanel').style.display = 'block';
            document.getElementById('playerName').value = '';
            document.getElementById('playerPassword').value = '';
            document.getElementById('saveMessage').innerHTML = '';
        }
    }

    let lastTimestamp = 0;
    function animate(timestamp) {
        if (!ctx) return;
        let deltaTime = Math.min(0.033, (timestamp - lastTimestamp) / 1000);
        if (isNaN(deltaTime)) deltaTime = 0.016;
        lastTimestamp = timestamp;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (let i=0; i<items.length; i++) {
            const item = items[i];
            const alive = item.update(deltaTime);
            if (!alive) {
                items.splice(i,1);
                addMiss();
                i--;
            } else {
                item.draw();
            }
        }

        if (gameRunning) {
            updatePigPosition(deltaTime);
        }

        ctx.save();
        ctx.font = '78px "Segoe UI Emoji", "Apple Color Emoji"';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowBlur = 12;
        ctx.shadowColor = "#ff6b6b";
        ctx.fillText("🐷", pigX, pigY);
        ctx.restore();

        if (gameRunning) {
            checkCollisions();
        }

        animationId = requestAnimationFrame(animate);
    }

    function startGame() {
        if (spawnInterval) clearInterval(spawnInterval);
        items = [];
        score = 0;
        missed = 0;
        gameRunning = true;
        pigX = canvas.width / 2;
        targetPigX = canvas.width / 2;
        currentSpeedMultiplier = 1.0;
        document.getElementById('score').innerText = '0';
        document.getElementById('miss').innerText = '0';
        document.getElementById('speedMultiplier').innerText = '1.0';
        document.getElementById('gameOverMsg').style.display = 'none';
        document.getElementById('saveScorePanel').style.display = 'none';
        spawnInterval = setInterval(() => {
            if (gameRunning) spawnItem();
        }, 1100);
        if (animationId) cancelAnimationFrame(animationId);
        lastTimestamp = 0;
        animationId = requestAnimationFrame(animate);
    }

    function resetGame() {
        if (spawnInterval) clearInterval(spawnInterval);
        gameRunning = false;
        cancelAnimationFrame(animationId);
        items = [];
        score = 0;
        missed = 0;
        currentSpeedMultiplier = 1.0;
        pigX = canvas.width / 2;
        targetPigX = canvas.width / 2;
        document.getElementById('score').innerText = '0';
        document.getElementById('miss').innerText = '0';
        document.getElementById('speedMultiplier').innerText = '1.0';
        document.getElementById('gameOverMsg').style.display = 'none';
        document.getElementById('saveScorePanel').style.display = 'none';
        startGame();
    }

    // Обновлённая функция сохранения рекорда с онлайн-отправкой
    async function saveScoreToLeaderboard() {
        const nameInput = document.getElementById('playerName');
        const passInput = document.getElementById('playerPassword');
        const msgDiv = document.getElementById('saveMessage');
        let playerName = nameInput.value.trim();
        if (!playerName) {
            msgDiv.innerHTML = 'Введите ник!';
            return;
        }
        if (playerName.length > 15) playerName = playerName.substring(0,15);
        
        const password = passInput.value;
        if (!password) {
            msgDiv.innerHTML = 'Введите пароль (мин 3 символа)!';
            return;
        }
        if (password.length < 3) {
            msgDiv.innerHTML = 'Пароль должен быть не менее 3 символов!';
            return;
        }
        
        // Локальная проверка пароля (как раньше)
        let userPasswords = {};
        try {
            userPasswords = JSON.parse(localStorage.getItem('pigPasswords')) || {};
        } catch(e) { userPasswords = {}; }
        
        const existingPassword = userPasswords[playerName];
        if (existingPassword === undefined) {
            userPasswords[playerName] = password;
            localStorage.setItem('pigPasswords', JSON.stringify(userPasswords));
        } else if (existingPassword !== password) {
            msgDiv.innerHTML = '❌ Неверный пароль!';
            return;
        }
        
        // Отправка онлайн-рекорда
        const onlineSuccess = await addOnlineRecord(playerName, finalScore);
        if (onlineSuccess) {
            msgDiv.innerHTML = `✅ Рекорд ${finalScore} сохранён в общую таблицу!`;
        } else {
            // Если онлайн не удалось, сохраняем локально (как запасной вариант)
            let leaderboard = [];
            try {
                leaderboard = JSON.parse(localStorage.getItem('pigLeaderboard')) || [];
            } catch(e) { leaderboard = []; }
            
            const existingEntry = leaderboard.find(entry => entry.name === playerName);
            if (existingEntry && finalScore <= existingEntry.score) {
                msgDiv.innerHTML = `⚠️ Ваш лучший результат ${existingEntry.score}. Новый не выше. (сохранён локально)`;
                return;
            }
            leaderboard = leaderboard.filter(entry => entry.name !== playerName);
            const newEntry = { name: playerName, score: finalScore, date: new Date().toLocaleDateString() };
            leaderboard.push(newEntry);
            leaderboard.sort((a,b) => b.score - a.score);
            leaderboard = leaderboard.slice(0,10);
            localStorage.setItem('pigLeaderboard', JSON.stringify(leaderboard));
            msgDiv.innerHTML = `🎉 Рекорд ${finalScore} сохранён локально (офлайн-режим).`;
        }
        
        setTimeout(() => {
            document.getElementById('saveScorePanel').style.display = 'none';
        }, 2000);
    }

    function openLeaderboard() {
        window.location.href = 'leaderboard.html';
    }

    function resizeGameCanvas() {
        const container = canvas.parentElement;
        const maxWidth = Math.min(900, container.clientWidth);
        canvas.style.width = `${maxWidth}px`;
        canvas.width = 900;
        canvas.height = 600;
        pigX = canvas.width / 2;
        targetPigX = canvas.width / 2;
    }
    window.addEventListener('resize', resizeGameCanvas);
    resizeGameCanvas();

    canvas.addEventListener('mousemove', handleMove);
    canvas.addEventListener('touchmove', handleMove, { passive: false });
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        handleMove(e);
    });

    document.getElementById('resetGame').addEventListener('click', resetGame);
    document.getElementById('leaderboardBtn').addEventListener('click', openLeaderboard);
    document.getElementById('saveScoreBtn').addEventListener('click', saveScoreToLeaderboard);

    document.getElementById('best').innerText = bestScore;
    startGame();
</script>
</body>
</html>
