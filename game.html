<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Игра «Собери корм» | Pigs Team</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 20% 40%, #1f1b24, #030303);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            display: block;
        }
        .game-container {
            position: relative;
            z-index: 2;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 20px;
            border: 1px solid rgba(255,107,107,0.5);
            max-width: 1000px;
            width: 100%;
        }
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 20px;
            padding: 0 16px;
        }
        .score-box, .best-box, .miss-box, .speed-box {
            background: rgba(0,0,0,0.6);
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #ffb347;
            border: 1px solid #ff6b6b;
        }
        .score-box span, .best-box span, .miss-box span, .speed-box span {
            color: white;
            font-size: 0.9rem;
        }
        .miss-box {
            color: #ff8888;
        }
        .speed-box {
            color: #88ff88;
        }
        .canvas-wrapper {
            display: flex;
            justify-content: center;
            position: relative;
        }
        canvas {
            background: rgba(20,20,30,0.5);
            border-radius: 32px;
            cursor: crosshair;
            box-shadow: 0 0 20px rgba(255,107,107,0.3);
            width: 100%;
            height: auto;
            border: 1px solid #ff6b6b;
            display: block;
        }
        .game-over-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            padding: 16px 32px;
            border-radius: 60px;
            font-size: 2rem;
            font-weight: bold;
            color: #ff6b6b;
            border: 2px solid #ff6b6b;
            white-space: nowrap;
            z-index: 10;
            pointer-events: none;
            text-align: center;
            box-shadow: 0 0 20px rgba(255,107,107,0.5);
        }
        .speed-popup {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 1.4rem;
            font-weight: bold;
            color: #ffb347;
            border: 1px solid #ff6b6b;
            white-space: nowrap;
            z-index: 20;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 24px;
        }
        button {
            background: rgba(255,107,107,0.2);
            border: 1px solid #ff6b6b;
            color: #ffb347;
            font-weight: bold;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(4px);
        }
        button:hover {
            background: rgba(255,107,107,0.4);
            transform: scale(1.02);
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: #ffb347;
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px dashed;
        }
        @media (max-width: 600px) {
            .score-box, .best-box, .miss-box, .speed-box { font-size: 1rem; padding: 4px 12px; }
            button { padding: 6px 18px; }
            .game-over-message { font-size: 1.4rem; padding: 12px 24px; white-space: nowrap; }
        }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="game-container">
    <div class="game-header">
        <div class="score-box">🐷 <span id="score">0</span></div>
        <div class="best-box">🏆 <span id="best">0</span></div>
        <div class="miss-box">❌ <span id="miss">0</span> / 5</div>
        <div class="speed-box">⚡ <span id="speedMultiplier">1.0</span>x</div>
    </div>
    <div class="canvas-wrapper">
        <canvas id="gameCanvas" width="900" height="600" style="width:100%; height:auto; max-width:900px; aspect-ratio:900/600"></canvas>
        <div id="gameOverMsg" class="game-over-message" style="display: none;">GAME OVER</div>
        <div id="speedPopup" class="speed-popup" style="opacity:0;">SPEED UP!</div>
    </div>
    <div class="controls">
        <button id="resetGame">Новая игра</button>
        <button id="backToSite" onclick="window.location.href='index.html'">На главную</button>
    </div>
    <div class="back-link">
        <a href="index.html">← Вернуться на сайт Pigs Team</a>
    </div>
</div>

<script>
    // ==================== ФОН (частицы + свиньи) ====================
    const bgCanvas = document.getElementById('bg-canvas');
    const bgCtx = bgCanvas.getContext('2d');
    let bgWidth, bgHeight;
    let particles = [];
    let flyingPigs = [];
    let mouseX = 0, mouseY = 0;

    function resizeBgCanvas() {
        bgWidth = window.innerWidth;
        bgHeight = window.innerHeight;
        bgCanvas.width = bgWidth;
        bgCanvas.height = bgHeight;
    }
    window.addEventListener('resize', resizeBgCanvas);
    resizeBgCanvas();

    const PARTICLE_COUNT = 45;
    class Particle {
        constructor() {
            this.x = Math.random() * bgWidth;
            this.y = Math.random() * bgHeight;
            this.size = Math.random() * 2 + 1;
            this.speedX = (Math.random() - 0.5) * 0.4;
            this.speedY = (Math.random() - 0.5) * 0.4;
            this.opacity = Math.random() * 0.5 + 0.2;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            if (this.x < 0) this.x = bgWidth;
            if (this.x > bgWidth) this.x = 0;
            if (this.y < 0) this.y = bgHeight;
            if (this.y > bgHeight) this.y = 0;
            const dx = mouseX - this.x;
            const dy = mouseY - this.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 100) {
                const angle = Math.atan2(dy, dx);
                const force = (100 - dist) / 100 * 1.2;
                this.x -= Math.cos(angle) * force;
                this.y -= Math.sin(angle) * force;
            }
        }
        draw() {
            bgCtx.beginPath();
            bgCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            bgCtx.fillStyle = `rgba(255, 107, 107, ${this.opacity})`;
            bgCtx.fill();
        }
    }

    const PIG_COUNT = 6;
    class FlyingPig {
        constructor() {
            this.x = Math.random() * bgWidth;
            this.y = Math.random() * bgHeight;
            this.size = Math.random() * 28 + 20;
            this.speedX = (Math.random() - 0.5) * 0.3;
            this.speedY = (Math.random() - 0.5) * 0.3;
            this.opacity = Math.random() * 0.4 + 0.2;
            this.rotation = Math.random() * Math.PI * 2;
            this.rotationSpeed = (Math.random() - 0.5) * 0.01;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.rotation += this.rotationSpeed;
            const dx = mouseX - this.x;
            const dy = mouseY - this.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 100) {
                const angle = Math.atan2(dy, dx);
                const force = (100 - dist) / 100 * 1.0;
                this.x -= Math.cos(angle) * force;
                this.y -= Math.sin(angle) * force;
            }
            if (this.x < -60) this.x = bgWidth + 60;
            if (this.x > bgWidth + 60) this.x = -60;
            if (this.y < -60) this.y = bgHeight + 60;
            if (this.y > bgHeight + 60) this.y = -60;
        }
        draw() {
            bgCtx.save();
            bgCtx.translate(this.x, this.y);
            bgCtx.rotate(this.rotation);
            bgCtx.font = `${this.size}px "Segoe UI Emoji", "Apple Color Emoji", sans-serif`;
            bgCtx.shadowBlur = 6;
            bgCtx.shadowColor = "rgba(255,107,107,0.5)";
            bgCtx.globalAlpha = this.opacity;
            bgCtx.fillStyle = "#ffb347";
            bgCtx.fillText("🐷", 0, 0);
            bgCtx.globalAlpha = 1;
            bgCtx.shadowBlur = 0;
            bgCtx.restore();
        }
    }

    function initBackground() {
        particles = [];
        for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());
        flyingPigs = [];
        for (let i = 0; i < PIG_COUNT; i++) flyingPigs.push(new FlyingPig());
    }
    initBackground();

    function animateBackground() {
        if (!bgCtx) return;
        bgCtx.clearRect(0, 0, bgWidth, bgHeight);
        particles.forEach(p => { p.update(); p.draw(); });
        flyingPigs.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animateBackground);
    }
    animateBackground();

    document.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
    document.addEventListener('touchmove', (e) => { const touch = e.touches[0]; mouseX = touch.clientX; mouseY = touch.clientY; });
    document.addEventListener('touchend', () => { mouseX = -1000; mouseY = -1000; });

    // ==================== ОСНОВНАЯ ИГРА ====================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let score = 0;
    let bestScore = localStorage.getItem('pigGameBest') ? parseInt(localStorage.getItem('pigGameBest')) : 0;
    let items = [];
    let gameRunning = true;
    let spawnInterval;
    let animationId;
    let missed = 0;
    const MAX_MISS = 5;

    // Звуки хрюканья (три варианта)
    const sounds = [
        new Audio('https://zvukogram.com/zvuk/73601/'),
        new Audio('https://zvukogram.com/zvuk/37934/'),
        new Audio('https://zvukogram.com/zvuk/73608/')
    ];
    sounds.forEach(s => s.load());

    const ITEM_TYPES = [
        { emoji: '🌽', points: 1 },
        { emoji: '🍎', points: 1 },
        { emoji: '🥕', points: 1 }
    ];

    class FoodItem {
        constructor(x, y, type, speedMultiplier) {
            this.x = x;
            this.y = y;
            this.type = type;
            this.radius = 28;      // увеличен радиус
            // базовая скорость + случайный разброс, умноженная на общий множитель
            let baseSpeed = 1.5 + Math.random() * 1.0;
            this.speedY = baseSpeed * speedMultiplier;
            this.speedX = (Math.random() - 0.5) * 0.8;
        }
        update() {
            this.y += this.speedY;
            this.x += this.speedX;
            if (this.y > canvas.height + 50) return false;
            if (this.x < this.radius) this.x = this.radius;
            if (this.x > canvas.width - this.radius) this.x = canvas.width - this.radius;
            return true;
        }
        draw() {
            ctx.save();
            ctx.shadowBlur = 8;
            ctx.shadowColor = "rgba(0,0,0,0.3)";
            ctx.font = `${this.radius * 1.2}px "Segoe UI Emoji", "Apple Color Emoji"`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(this.type.emoji, this.x, this.y);
            ctx.restore();
        }
    }

    let pigX = canvas.width / 2;
    const pigY = canvas.height - 60;
    const pigRadius = 42;   // увеличен радиус свиньи

    // Динамическая сложность
    let currentSpeedMultiplier = 1.0;
    let lastScoreThreshold = 0;
    const SPEED_INCREASE_STEP = 0.3;   // +0.3 каждые 15 очков
    const SPAWN_BASE_INTERVAL = 800;    // мс
    const MIN_SPAWN_INTERVAL = 400;

    function updateDifficulty() {
        let newMultiplier = 1 + Math.floor(score / 15) * SPEED_INCREASE_STEP;
        newMultiplier = Math.min(newMultiplier, 2.5); // макс 2.5x
        if (newMultiplier > currentSpeedMultiplier && score > 0) {
            // показываем всплывашку
            const popup = document.getElementById('speedPopup');
            popup.style.opacity = '1';
            setTimeout(() => { popup.style.opacity = '0'; }, 1000);
        }
        currentSpeedMultiplier = newMultiplier;
        document.getElementById('speedMultiplier').innerText = currentSpeedMultiplier.toFixed(1);
        
        // пересчёт интервала спавна
        let interval = SPAWN_BASE_INTERVAL / (1 + Math.floor(score / 20) * 0.25);
        interval = Math.max(interval, MIN_SPAWN_INTERVAL);
        if (spawnInterval) {
            clearInterval(spawnInterval);
            spawnInterval = setInterval(() => {
                if (gameRunning) spawnItem();
            }, interval);
        }
    }

    function updatePigPosition(clientX) {
        if (!gameRunning) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        let canvasX = (clientX - rect.left) * scaleX;
        canvasX = Math.min(Math.max(canvasX, pigRadius), canvas.width - pigRadius);
        pigX = canvasX;
    }

    function handleMove(e) {
        let clientX;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            e.preventDefault();
        } else {
            clientX = e.clientX;
        }
        updatePigPosition(clientX);
    }

    function checkCollisions() {
        for (let i = items.length-1; i >= 0; i--) {
            const item = items[i];
            const dx = pigX - item.x;
            const dy = pigY - item.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < pigRadius + item.radius) {
                items.splice(i,1);
                addScore(item.type.points);
                playOink();
            }
        }
    }

    function spawnItem() {
        if (!gameRunning) return;
        const type = ITEM_TYPES[Math.floor(Math.random() * ITEM_TYPES.length)];
        const x = 30 + Math.random() * (canvas.width - 60);
        const y = -20;
        items.push(new FoodItem(x, y, type, currentSpeedMultiplier));
    }

    function addScore(points) {
        score += points;
        document.getElementById('score').innerText = score;
        if (score > bestScore) {
            bestScore = score;
            localStorage.setItem('pigGameBest', bestScore);
            document.getElementById('best').innerText = bestScore;
        }
        updateDifficulty();
    }

    function addMiss() {
        missed++;
        document.getElementById('miss').innerText = missed;
        if (missed >= MAX_MISS) {
            gameOver();
        }
    }

    function playOink() {
        const randomSound = sounds[Math.floor(Math.random() * sounds.length)];
        randomSound.currentTime = 0;
        randomSound.play().catch(e => console.log("Audio play failed", e));
    }

    function gameOver() {
        if (!gameRunning) return;
        gameRunning = false;
        if (spawnInterval) clearInterval(spawnInterval);
        document.getElementById('gameOverMsg').style.display = 'block';
    }

    function animate() {
        if (!ctx) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Обновляем и рисуем предметы с учётом текущей сложности
        for (let i=0; i<items.length; i++) {
            const item = items[i];
            // обновляем скорость предмета в соответствии с текущим множителем (для плавности)
            // но проще пересоздавать? Нет, будем динамически менять скорость каждого предмета
            // для плавного ускорения уже падающих фруктов
            let targetSpeedY = (1.5 + Math.random()*1.0) * currentSpeedMultiplier;
            // плавно приближаем скорость к целевой
            item.speedY = item.speedY * 0.98 + targetSpeedY * 0.02;
            const alive = item.update();
            if (!alive) {
                items.splice(i,1);
                addMiss();
                i--;
            } else {
                item.draw();
            }
        }

        // Рисуем свинью
        ctx.save();
        // добавляем свечение при высокой скорости
        if (currentSpeedMultiplier > 1.5) {
            ctx.shadowBlur = 20;
            ctx.shadowColor = "#ff6b6b";
        } else {
            ctx.shadowBlur = 12;
            ctx.shadowColor = "#ff6b6b";
        }
        ctx.font = '72px "Segoe UI Emoji", "Apple Color Emoji"';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText("🐷", pigX, pigY);
        ctx.restore();

        if (gameRunning) {
            checkCollisions();
        }

        animationId = requestAnimationFrame(animate);
    }

    function startGame() {
        if (spawnInterval) clearInterval(spawnInterval);
        items = [];
        score = 0;
        missed = 0;
        gameRunning = true;
        pigX = canvas.width / 2;
        currentSpeedMultiplier = 1.0;
        document.getElementById('score').innerText = '0';
        document.getElementById('miss').innerText = '0';
        document.getElementById('speedMultiplier').innerText = '1.0';
        document.getElementById('gameOverMsg').style.display = 'none';
        // начальный интервал
        let interval = SPAWN_BASE_INTERVAL;
        spawnInterval = setInterval(() => {
            if (gameRunning) spawnItem();
        }, interval);
        if (animationId) cancelAnimationFrame(animationId);
        animate();
    }

    function resetGame() {
        if (spawnInterval) clearInterval(spawnInterval);
        gameRunning = false;
        cancelAnimationFrame(animationId);
        items = [];
        score = 0;
        missed = 0;
        currentSpeedMultiplier = 1.0;
        pigX = canvas.width / 2;
        document.getElementById('score').innerText = '0';
        document.getElementById('miss').innerText = '0';
        document.getElementById('speedMultiplier').innerText = '1.0';
        document.getElementById('gameOverMsg').style.display = 'none';
        startGame();
    }

    function resizeGameCanvas() {
        const container = canvas.parentElement;
        const maxWidth = Math.min(900, container.clientWidth);
        canvas.style.width = `${maxWidth}px`;
        canvas.width = 900;
        canvas.height = 600;
        pigX = canvas.width / 2;
    }
    window.addEventListener('resize', resizeGameCanvas);
    resizeGameCanvas();

    canvas.addEventListener('mousemove', handleMove);
    canvas.addEventListener('touchmove', handleMove, { passive: false });
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        handleMove(e);
    });

    document.getElementById('resetGame').addEventListener('click', resetGame);

    document.getElementById('best').innerText = bestScore;
    startGame();
</script>
</body>
</html>
